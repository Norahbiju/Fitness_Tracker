apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Norahbiju/Fitness_Tracker.git
    targetRevision: master
    path: project
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true